<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>用户管理系统 · 认证版</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        max-width: 1000px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .container {
        background: #d3ecf1;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h1 {
        margin-top: 0;
      }
      .tabs {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
        border-bottom: 1px solid #ddd;
        padding-bottom: 0.5rem;
      }
      .tab {
        background: none;
        border: none;
        font-size: 1.1rem;
        padding: 0.5rem 1rem;
        cursor: pointer;
        opacity: 0.6;
        color: #333;
      }
      .tab:hover {
        color: white;
      }
      .tab.active {
        opacity: 1;
        border-bottom: 3px solid #007bff;
        font-weight: bold;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      input {
        padding: 10px;
        width: 100%;
        max-width: 300px;
        border: 1px solid #ccc;
        border-radius: 6px;
        margin-right: 10px;
      }
      button {
        padding: 10px 20px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover {
        background: #0056b3;
      }
      .danger-btn {
        background: #dc3545;
      }
      .danger-btn:hover {
        background: #c82333;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1.5rem;
        background: white;
      }
      th,
      td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #ddd;
      }
      .actions button {
        padding: 4px 10px;
        margin-right: 5px;
        font-size: 13px;
      }
      .user-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }
      .search-box {
        display: flex;
        gap: 10px;
      }
      .pagination {
        margin-top: 1rem;
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: center;
      }
      .error {
        color: #dc3545;
        margin-top: 5px;
        font-size: 0.9rem;
      }
      .hidden {
        display: none !important;
      }
      .status-badge {
        font-size: 0.8rem;
        padding: 2px 8px;
        border-radius: 20px;
        background: #28a745;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 认证区域（未登录时显示） -->
      <div id="authSection">
        <div class="tabs">
          <button class="tab active" data-tab="login">登录</button>
          <button class="tab" data-tab="register">注册</button>
        </div>

        <!-- 登录表单 -->
        <div id="loginForm">
          <div class="form-group">
            <input
              type="email"
              id="loginEmail"
              placeholder="邮箱"
              value="test@example.com"
            />
          </div>
          <div class="form-group">
            <input
              type="password"
              id="loginPassword"
              placeholder="密码"
              value="123456"
            />
          </div>
          <button onclick="handleLogin()">登录</button>
          <div id="loginError" class="error"></div>
        </div>

        <!-- 注册表单（默认隐藏） -->
        <div id="registerForm" style="display: none">
          <div class="form-group">
            <input type="text" id="regName" placeholder="姓名" />
          </div>
          <div class="form-group">
            <input type="email" id="regEmail" placeholder="邮箱" />
          </div>
          <div class="form-group">
            <input
              type="password"
              id="regPassword"
              placeholder="密码（至少6位）"
            />
          </div>
          <button onclick="handleRegister()">注册</button>
          <div id="regError" class="error"></div>
        </div>
      </div>

      <!-- 主应用区域（登录后显示） -->
      <div id="appSection" class="hidden">
        <div class="user-bar">
          <h1>📋 用户管理</h1>
          <div>
            <span id="currentUser" style="margin-right: 20px"></span>
            <button class="danger-btn" onclick="logout()">退出登录</button>
          </div>
        </div>

        <!-- 添加用户 -->
        <div class="form-group" style="display: flex; gap: 10px">
          <input type="text" id="newName" placeholder="姓名" />
          <input type="email" id="newEmail" placeholder="邮箱" />
          <button onclick="createUser()">➕ 添加用户</button>
        </div>

        <!-- 搜索与刷新 -->
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="搜索姓名或邮箱" />
          <button onclick="fetchUsers()">🔍 搜索</button>
          <button
            onclick="
              document.getElementById('searchInput').value = '';
              fetchUsers();
            "
          >
            重置
          </button>
        </div>

        <!-- 用户列表 -->
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>姓名</th>
              <th>邮箱</th>
              <th>创建时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="userTableBody"></tbody>
        </table>

        <!-- 分页 -->
        <div class="pagination" id="pagination"></div>
      </div>
    </div>

    <script>
      // ==================== 全局变量 ====================
      const API_BASE = '/api';
      let currentPage = 1;
      const limit = 5;
      let currentUserInfo = null;
      let accessToken = localStorage.getItem('accessToken') || '';
      let refreshToken = localStorage.getItem('refreshToken') || '';

      // ==================== 工具函数 ====================
      function escapeHtml(text) {
        if (!text) return text;
        return String(text).replace(
          /[&<>"]/g,
          (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c],
        );
      }

      // 带认证的 fetch 封装
      // 改造 authFetch，加入自动刷新逻辑
      async function authFetch(url, options = {}) {
        const makeRequest = async (token) => {
          const headers = {
            'Content-Type': 'application/json',
            ...options.headers,
          };
          if (token) {
            headers['Authorization'] = `Bearer ${token}`;
          }
          return fetch(url, { ...options, headers });
        };

        // 第一次尝试
        let response = await makeRequest(accessToken);

        // 如果返回 401，尝试刷新 Token
        if (response.status === 401 && refreshToken) {
          try {
            await refreshAccessToken();
            // 用新 token 解码并更新页面上的用户信息
            try {
              const payload = JSON.parse(atob(accessToken.split('.')[1]));
              currentUserInfo = {
                id: payload.userId,
                email: payload.email,
                name: payload.name,
              };
              document.getElementById('currentUser').innerHTML =
                `👤 ${escapeHtml(currentUserInfo.name)} (${escapeHtml(currentUserInfo.email)}) <span class="status-badge">已登录</span>`;
            } catch (e) {}
            // 用新 Token 重试原请求
            response = await makeRequest(accessToken);
          } catch (err) {
            // 刷新失败，跳转到登录页
            logout();
            throw new Error('登录已过期，请重新登录');
          }
        }

        return response;
      }

      // ==================== 认证逻辑 ====================
      // 存储 Token（登录时调用）
      function setTokens(access, refresh) {
        accessToken = access;
        refreshToken = refresh;
        localStorage.setItem('accessToken', access);
        localStorage.setItem('refreshToken', refresh);
      }

      // 清除 Token（登出时调用）
      function clearTokens() {
        accessToken = '';
        refreshToken = '';
        localStorage.removeItem('accessToken');
        localStorage.removeItem('refreshToken');
      }

      // 刷新 Token 的函数
      async function refreshAccessToken() {
        if (!refreshToken) throw new Error('无 Refresh Token');

        const res = await fetch(`${API_BASE}/auth/refresh`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ refreshToken }),
        });

        if (!res.ok) {
          clearTokens();
          throw new Error('刷新失败，请重新登录');
        }

        const data = await res.json();
        accessToken = data.accessToken;
        localStorage.setItem('accessToken', accessToken);
        // 如果后端返回了新的 refreshToken，也更新它
        if (data.refreshToken) {
          refreshToken = data.refreshToken;
          localStorage.setItem('refreshToken', refreshToken);
        }
        return accessToken;
      }

      async function handleLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const errorDiv = document.getElementById('loginError');
        errorDiv.textContent = '';

        if (!email || !password) {
          errorDiv.textContent = '请填写邮箱和密码';
          return;
        }

        try {
          const res = await fetch(`${API_BASE}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();
          if (!res.ok) {
            const msg = data.details
              ? data.details.map((d) => d.message).join('；')
              : data.error || '登录失败';
            throw new Error(msg);
          }

          setTokens(data.accessToken, data.refreshToken);
          currentUserInfo = data.user;
          showApp();
        } catch (err) {
          errorDiv.textContent = err.message;
        }
      }

      async function handleRegister() {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const errorDiv = document.getElementById('regError');
        errorDiv.textContent = '';

        if (!name || !email || !password) {
          errorDiv.textContent = '所有字段均为必填';
          return;
        }
        if (password.length < 6) {
          errorDiv.textContent = '密码至少6位';
          return;
        }

        try {
          const res = await fetch(`${API_BASE}/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password }),
          });
          const data = await res.json();
          if (!res.ok) {
            const msg = data.details
              ? data.details.map((d) => d.message).join('；')
              : data.error || '注册失败';
            throw new Error(msg);
          }

          alert('注册成功！请登录');
          // 切换到登录页，并预填邮箱
          document.querySelector('[data-tab="login"]').click();
          document.getElementById('loginEmail').value = email;
        } catch (err) {
          errorDiv.textContent = err.message;
        }
      }

      async function logout() {
        if (refreshToken) {
          // 通知服务端撤销 Refresh Token
          await fetch(`${API_BASE}/auth/logout`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ refreshToken }),
          }).catch(() => {});
        }
        clearTokens();
        currentUserInfo = null;
        document.getElementById('authSection').style.display = 'block';
        document.getElementById('appSection').classList.add('hidden');
      }

      function showApp() {
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('appSection').classList.remove('hidden');
        document.getElementById('currentUser').innerHTML =
          `👤 ${escapeHtml(currentUserInfo?.name || '')} (${escapeHtml(currentUserInfo?.email || '')}) <span class="status-badge">已登录</span>`;
        currentPage = 1;
        fetchUsers();
      }

      // ==================== 用户管理（CRUD）====================
      async function fetchUsers() {
        const search = document.getElementById('searchInput').value.trim();
        const url = `${API_BASE}/users/list?page=${currentPage}&limit=${limit}&search=${encodeURIComponent(search)}`;

        try {
          const res = await authFetch(url);
          const result = await res.json();
          renderTable(result.data);
          renderPagination(result.pagination);
        } catch (err) {
          alert('获取用户列表失败: ' + err.message);
        }
      }

      function renderTable(users) {
        const tbody = document.getElementById('userTableBody');
        if (!users || users.length === 0) {
          tbody.innerHTML =
            '<tr><td colspan="5" style="text-align:center;">暂无数据</td></tr>';
          return;
        }
        tbody.innerHTML = users
          .map(
            (user) => `
          <tr>
            <td>${user.id}</td>
            <td>${escapeHtml(user.name)}</td>
            <td>${escapeHtml(user.email)}</td>
            <td>${user.created_at ? new Date(user.created_at).toLocaleString() : '-'}</td>
            <td class="actions">
              <button onclick='editUser(${user.id}, "${escapeHtml(user.name)}", "${escapeHtml(user.email)}")'>✏️ 编辑</button>
              <button class="danger-btn" onclick='deleteUser(${user.id})'>🗑️ 删除</button>
            </td>
          </tr>
        `,
          )
          .join('');
      }

      function renderPagination(pagination) {
        const div = document.getElementById('pagination');
        if (!pagination) return;
        const { page, totalPages } = pagination;
        let html = `<button ${page === 1 ? 'disabled' : ''} onclick="goToPage(${page - 1})">上一页</button>`;
        html += `<span> 第 ${page} / ${totalPages} 页 </span>`;
        html += `<button ${page === totalPages ? 'disabled' : ''} onclick="goToPage(${page + 1})">下一页</button>`;
        div.innerHTML = html;
      }

      function goToPage(page) {
        currentPage = page;
        fetchUsers();
      }

      async function createUser() {
        const name = document.getElementById('newName').value.trim();
        const email = document.getElementById('newEmail').value.trim();
        if (!name || !email) return alert('姓名和邮箱不能为空');

        try {
          const res = await authFetch(`${API_BASE}/users/add`, {
            method: 'POST',
            body: JSON.stringify({ name, email }),
          });
          if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error);
          }
          document.getElementById('newName').value = '';
          document.getElementById('newEmail').value = '';
          currentPage = 1;
          fetchUsers();
        } catch (err) {
          alert('创建失败: ' + err.message);
        }
      }

      async function deleteUser(id) {
        if (!confirm('确定删除该用户吗？')) return;
        try {
          await authFetch(`${API_BASE}/users/delete/${id}`, {
            method: 'DELETE',
          });
          fetchUsers();
        } catch (err) {
          alert('删除失败: ' + err.message);
        }
      }

      function editUser(id, oldName, oldEmail) {
        const newName = prompt('修改姓名', oldName);
        if (newName === null) return;
        const newEmail = prompt('修改邮箱', oldEmail);
        if (newEmail === null) return;

        authFetch(`${API_BASE}/users/update/${id}`, {
          method: 'PUT',
          body: JSON.stringify({ name: newName, email: newEmail }),
        })
          .then((res) => {
            if (!res.ok)
              return res.json().then((err) => {
                throw new Error(err.error);
              });
            fetchUsers();
          })
          .catch((err) => alert('更新失败: ' + err.message));
      }

      // ==================== 页面初始化 ====================
      // Tab 切换
      document.querySelectorAll('.tab').forEach((tab) => {
        tab.addEventListener('click', () => {
          document
            .querySelectorAll('.tab')
            .forEach((t) => t.classList.remove('active'));
          tab.classList.add('active');
          const isLogin = tab.dataset.tab === 'login';
          document.getElementById('loginForm').style.display = isLogin
            ? 'block'
            : 'none';
          document.getElementById('registerForm').style.display = isLogin
            ? 'none'
            : 'block';
          document.getElementById('loginError').textContent = '';
          document.getElementById('regError').textContent = '';
        });
      });

      // 检查是否已登录
      if (accessToken) {
        // 尝试验证 Token 是否有效（调用一个受保护接口）
        authFetch(`${API_BASE}/users/list?page=1&limit=1`)
          .then((res) => {
            if (res.ok) {
              // 用刷新后的最新 accessToken 解码用户信息
              try {
                const payload = JSON.parse(atob(accessToken.split('.')[1]));
                currentUserInfo = {
                  id: payload.userId,
                  email: payload.email,
                  name: payload.name,
                };
              } catch (e) {}
              showApp();
            } else {
              logout();
            }
          })
          .catch(() => logout());
      } else {
        document.getElementById('authSection').style.display = 'block';
        document.getElementById('appSection').classList.add('hidden');
      }
    </script>
  </body>
</html>
